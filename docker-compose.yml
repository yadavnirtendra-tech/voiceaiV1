version: '3.8'
services:
  kokoro-tts:
    image: ghcr.io/remsky/kokoro-fastapi-cpu:latest
    ports: ["8880:8880"]
    restart: unless-stopped
  whisper-stt:
    image: fedirz/faster-whisper-server:latest-cpu
    ports: ["8765:8000"]
    environment:
      - WHISPER__MODEL=Systran/faster-whisper-base
    restart: unless-stopped
